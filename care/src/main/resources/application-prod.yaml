# Spring Boot application configuration.
spring:
  application:
    name: care-prod
  # Database settings.
  datasource:
    url: jdbc:h2:file:./data/healthdb;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  # Web server settings.
  server:
    port: 8080
  # SQL initialization.
  sql:
    init:
      mode: always
  # JPA/Hibernate.
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  # H2 console.
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT properties (simple secret for demo; rotate in prod).
app:
  jwt:
    # Symmetric key to be kept secret generated by the following shell command:
    # openssl rand -base64 32
    secret: "____________secret_symmetric_key____________"
    expiration-ms: 86400000 # One day.
  test-password: "testQwerty123"

# Logging configuration.
logging:
  level:
    root: INFO
    local.health: WARN
