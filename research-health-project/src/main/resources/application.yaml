# Spring Boot application configuration.
spring:
  application:
    name: research
  # Database settings.
  datasource:
    url: jdbc:h2:file:./data/research-health-project-db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  # Web server settings.
  server:
    port: 8080
  # SQL initialization.
  sql:
    init:
      mode: embedded
  # JPA/Hibernate.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # H2 console.
  h2:
    console:
      enabled: true
      path: /h2-console
  # GraphQL
  graphql:
    graphiql:
      enabled: true